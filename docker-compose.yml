version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: task-postgres

    restart: always

    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7

    container_name: task-redis

    restart: always

    ports:
      - "6379:6379"


  app:

    build: .

    container_name: task-management-system

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: amir_task_manager_secret_key_123456

    ports:
      - "8080:8080"


volumes:
  postgres_data: