version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: task-postgres

    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: task-redis

    ports:
      - "6379:6379"

  app:

    build: .

    container_name: task-management

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: amir_task_manager_secret_key_123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: true
      LOGGING_LEVEL_ORG_HIBERNATE: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: DEBUG